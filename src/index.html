<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaScan – Fish Identifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --deep: #020d1a;
    --abyss: #040e1c;
    --ocean: #062642;
    --mid: #0a3a60;
    --teal: #0d9488;
    --cyan: #22d3ee;
    --aqua: #06b6d4;
    --foam: #e0f7ff;
    --biolum: #7fffd4;
    --amber: #f59e0b;
    --coral: #f97316;
    --text: #cce9f5;
    --muted: #5a8ba8;
    --card: rgba(6,38,66,0.7);
    --glass: rgba(13,148,136,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* — Animated water background — */
  .ocean-bg {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
    background: radial-gradient(ellipse at 20% 80%, #062642 0%, #020d1a 60%),
                radial-gradient(ellipse at 80% 20%, #041a2e 0%, transparent 50%);
  }
  .bubble {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(34,211,238,0.35), rgba(6,182,212,0.07));
    border: 1px solid rgba(34,211,238,0.15);
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(110vh) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-10vh) scale(1.3) translateX(20px); opacity: 0; }
  }
  .ray {
    position: absolute; top: -20%; width: 2px; height: 140%;
    background: linear-gradient(to bottom, transparent, rgba(34,211,238,0.06) 40%, transparent);
    animation: sway 8s ease-in-out infinite alternate;
    transform-origin: top center;
  }
  @keyframes sway { 0% { transform: rotate(-8deg); } 100% { transform: rotate(8deg); } }
  .scanline-overlay {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
  }

  /* — Layout — */
  .app { position: relative; z-index: 2; max-width: 860px; margin: 0 auto; padding: 0 20px 60px; }

  /* — Header — */
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 32px 0 28px;
    border-bottom: 1px solid rgba(34,211,238,0.12);
  }
  .logo-mark {
    width: 48px; height: 48px; position: relative; flex-shrink: 0;
  }
  .logo-mark svg { width: 100%; height: 100%; }
  .logo-text h1 {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: clamp(24px, 5vw, 32px);
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--cyan), var(--biolum));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-text p {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin-top: 2px;
  }
  .status-pill {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    background: rgba(13,148,136,0.12); border: 1px solid rgba(13,148,136,0.3);
    border-radius: 100px; padding: 6px 14px; font-size: 11px; letter-spacing: 1px;
    color: var(--teal);
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--teal);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(0.8);} }

  /* — Scan Section — */
  .scan-section { margin-top: 32px; }
  .section-label {
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: linear-gradient(to right, rgba(34,211,238,0.2), transparent);
  }

  .scan-modes { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .mode-btn {
    flex: 1; min-width: 130px; padding: 12px 18px;
    background: var(--card); border: 1px solid rgba(34,211,238,0.12);
    border-radius: 10px; color: var(--muted); font-family: 'Space Mono', monospace;
    font-size: 12px; letter-spacing: 1px; cursor: pointer;
    transition: all 0.25s ease; display: flex; align-items: center; gap: 10px;
  }
  .mode-btn:hover { border-color: rgba(34,211,238,0.3); color: var(--text); }
  .mode-btn.active {
    background: rgba(13,148,136,0.18); border-color: var(--teal);
    color: var(--cyan); box-shadow: 0 0 20px rgba(13,148,136,0.15);
  }
  .mode-btn svg { flex-shrink: 0; }

  /* — Camera / Upload area — */
  .capture-zone {
    position: relative; border-radius: 16px; overflow: hidden;
    border: 1px solid rgba(34,211,238,0.18);
    background: var(--abyss); min-height: 320px;
    display: flex; align-items: center; justify-content: center;
  }
  #video, #preview-img {
    width: 100%; max-height: 460px; object-fit: cover; display: block;
    border-radius: 16px;
  }
  #preview-img { display: none; }
  .capture-idle {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    color: var(--muted); text-align: center; padding: 40px 20px;
  }
  .capture-idle svg { opacity: 0.4; }
  .capture-idle p { font-size: 13px; line-height: 1.7; }

  .scan-corners {
    position: absolute; inset: 0; pointer-events: none;
  }
  .corner {
    position: absolute; width: 20px; height: 20px;
    border-color: var(--cyan); border-style: solid; opacity: 0;
    transition: opacity 0.5s;
  }
  .corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }
  .capture-zone.active .corner { opacity: 1; }

  .scan-beam {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(to right, transparent, var(--cyan), transparent);
    box-shadow: 0 0 12px var(--cyan), 0 0 30px rgba(34,211,238,0.4);
    display: none; top: 20%;
    animation: beam 2.5s ease-in-out infinite;
  }
  @keyframes beam { 0%,100%{top:15%;} 50%{top:80%;} }
  .capture-zone.scanning .scan-beam { display: block; }

  /* — Controls — */
  .controls { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
  .btn-primary {
    flex: 1; min-width: 160px; padding: 15px 24px;
    background: linear-gradient(135deg, var(--teal), var(--aqua));
    border: none; border-radius: 12px; color: #fff;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 14px; letter-spacing: 1px; cursor: pointer;
    transition: all 0.25s ease; display: flex; align-items: center;
    justify-content: center; gap: 10px;
    box-shadow: 0 4px 24px rgba(13,148,136,0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(13,148,136,0.5); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-secondary {
    padding: 15px 20px; background: var(--card);
    border: 1px solid rgba(34,211,238,0.18); border-radius: 12px;
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 12px; cursor: pointer; transition: all 0.25s ease;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-secondary:hover { border-color: var(--cyan); color: var(--cyan); }

  #file-input { display: none; }

  /* — Scanning animation — */
  .analyzing-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(2,13,26,0.75); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; flex-direction: column;
    gap: 16px; border-radius: 16px; z-index: 10;
  }
  .analyzing-overlay.show { display: flex; }
  .sonar {
    width: 72px; height: 72px; position: relative;
  }
  .sonar-ring {
    position: absolute; border-radius: 50%;
    border: 2px solid var(--cyan); inset: 0;
    animation: sonar-out 2s ease-out infinite;
    opacity: 0;
  }
  .sonar-ring:nth-child(2) { animation-delay: 0.6s; }
  .sonar-ring:nth-child(3) { animation-delay: 1.2s; }
  @keyframes sonar-out {
    0% { transform: scale(0.3); opacity: 0.8; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  .sonar-dot {
    position: absolute; inset: 50%; transform: translate(-50%,-50%);
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--cyan); box-shadow: 0 0 20px var(--cyan);
  }
  .analyzing-text { font-size: 12px; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase; }

  /* — Results — */
  #results { display: none; margin-top: 32px; }

  .fish-card {
    background: var(--card); border: 1px solid rgba(34,211,238,0.18);
    border-radius: 20px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:none;} }

  .fish-hero {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  @media(max-width:600px){ .fish-hero { grid-template-columns: 1fr; } }

  .fish-image-panel {
    position: relative; min-height: 240px; overflow: hidden;
    background: var(--abyss);
  }
  .fish-image-panel img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    filter: saturate(1.15) contrast(1.05);
  }
  .confidence-badge {
    position: absolute; top: 14px; left: 14px;
    background: rgba(2,13,26,0.85); border: 1px solid var(--biolum);
    border-radius: 8px; padding: 6px 12px;
    font-size: 11px; color: var(--biolum); letter-spacing: 1px;
  }

  .fish-summary {
    padding: 28px 28px 24px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .fish-common { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; color: var(--foam); line-height: 1.1; }
  .fish-scientific { font-size: 12px; font-style: italic; color: var(--muted); }
  .fish-family { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .tag {
    padding: 4px 10px; border-radius: 6px; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase; border: 1px solid;
  }
  .tag.habitat { color: var(--cyan); border-color: rgba(34,211,238,0.3); background: rgba(34,211,238,0.07); }
  .tag.status  { color: var(--amber); border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.07); }
  .tag.edible  { color: var(--biolum); border-color: rgba(127,255,212,0.3); background: rgba(127,255,212,0.07); }

  /* — Detail grid — */
  .fish-details {
    padding: 0 28px 28px;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media(max-width:480px){ .fish-details { grid-template-columns: 1fr; } }

  .detail-item {
    background: rgba(4,14,28,0.5); border: 1px solid rgba(34,211,238,0.08);
    border-radius: 12px; padding: 16px;
  }
  .detail-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .detail-value { font-size: 14px; color: var(--text); line-height: 1.5; }

  /* — Description — */
  .fish-description {
    margin: 0 28px 28px;
    padding: 20px;
    background: rgba(34,211,238,0.04); border: 1px solid rgba(34,211,238,0.1);
    border-left: 3px solid var(--teal);
    border-radius: 0 12px 12px 0; font-size: 13px; line-height: 1.8; color: var(--text);
  }

  /* — Fun fact — */
  .fun-fact {
    margin: 0 28px 28px; display: flex; gap: 14px; align-items: flex-start;
    padding: 16px; background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.18);
    border-radius: 12px;
  }
  .fun-fact-icon { font-size: 22px; flex-shrink: 0; }
  .fun-fact-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--amber); margin-bottom: 4px; }
  .fun-fact-text { font-size: 13px; line-height: 1.7; color: var(--text); }

  /* — Share bar — */
  .share-bar {
    padding: 20px 28px; border-top: 1px solid rgba(34,211,238,0.1);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .share-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-right: auto; }
  .share-btn {
    display: flex; align-items: center; gap: 8px; padding: 10px 18px;
    border-radius: 10px; font-family: 'Space Mono', monospace; font-size: 12px;
    cursor: pointer; border: 1px solid; transition: all 0.2s;
  }
  .share-btn.twitter { color: #1da1f2; border-color: rgba(29,161,242,0.3); background: rgba(29,161,242,0.07); }
  .share-btn.twitter:hover { background: rgba(29,161,242,0.15); }
  .share-btn.facebook { color: #4267b2; border-color: rgba(66,103,178,0.3); background: rgba(66,103,178,0.07); }
  .share-btn.facebook:hover { background: rgba(66,103,178,0.15); }
  .share-btn.whatsapp { color: #25d366; border-color: rgba(37,211,102,0.3); background: rgba(37,211,102,0.07); }
  .share-btn.whatsapp:hover { background: rgba(37,211,102,0.15); }
  .share-btn.copy { color: var(--muted); border-color: rgba(90,139,168,0.3); background: rgba(90,139,168,0.07); }
  .share-btn.copy:hover { color: var(--cyan); border-color: rgba(34,211,238,0.3); }

  /* — Error — */
  .error-box {
    display: none; margin-top: 16px; padding: 16px 20px;
    background: rgba(249,115,22,0.08); border: 1px solid rgba(249,115,22,0.3);
    border-radius: 12px; color: var(--coral); font-size: 13px; line-height: 1.6;
  }
  .error-box.show { display: block; }

  /* — Toast — */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--ocean); border: 1px solid var(--teal); border-radius: 12px;
    padding: 12px 24px; font-size: 13px; color: var(--cyan);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 999;
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--deep); }
  ::-webkit-scrollbar-thumb { background: var(--mid); border-radius: 3px; }
</style>
</head>
<body>

<!-- Background -->
<div class="ocean-bg" id="oceanBg"></div>
<div class="scanline-overlay"></div>

<div class="app">

  <!-- Header -->
  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="22" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="4 3"/>
        <path d="M10 24 C14 18 20 14 28 15 C34 16 38 20 40 24 C38 28 34 32 28 33 C20 34 14 30 10 24Z" fill="none" stroke="#22d3ee" stroke-width="1.8"/>
        <path d="M28 15 L35 10 L32 18Z" fill="#0d9488"/>
        <circle cx="31" cy="21" r="2" fill="#22d3ee"/>
        <path d="M15 24 C17 22 19 22 21 24 C19 26 17 26 15 24Z" fill="rgba(34,211,238,0.3)" stroke="#22d3ee" stroke-width="1"/>
        <circle cx="24" cy="24" r="2" fill="none" stroke="#7fffd4" stroke-width="1.2"/>
        <line x1="24" y1="4" x2="24" y2="9" stroke="#0d9488" stroke-width="1.5"/>
        <line x1="24" y1="39" x2="24" y2="44" stroke="#0d9488" stroke-width="1.5"/>
        <line x1="4" y1="24" x2="9" y2="24" stroke="#0d9488" stroke-width="1.5"/>
        <line x1="39" y1="24" x2="44" y2="24" stroke="#0d9488" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="logo-text">
      <h1>AquaScan</h1>
      <p>Fish Identification System</p>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      AI ONLINE
    </div>
  </header>

  <!-- Scan Section -->
  <div class="scan-section">
    <div class="section-label">Input Source</div>

    <div class="scan-modes">
      <button class="mode-btn active" id="btnCamera" onclick="setMode('camera')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Live Camera
      </button>
      <button class="mode-btn" id="btnUpload" onclick="setMode('upload')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
          <path d="M9 10l3-3 3 3M12 7v6"/>
        </svg>
        Upload Image
      </button>
    </div>

    <div class="capture-zone" id="captureZone">
      <div class="scan-corners">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
      <div class="scan-beam"></div>

      <video id="video" autoplay playsinline style="display:none;"></video>
      <img id="preview-img" alt="Fish preview"/>
      <canvas id="canvas" style="display:none;"></canvas>

      <div class="capture-idle" id="idlePlaceholder">
        <svg width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24" color="#22d3ee">
          <path d="M21 16.5a.5.5 0 01-.5.5h-15a.5.5 0 01-.5-.5v-10a.5.5 0 01.5-.5h3.25L10.5 4h3l1.75 2.5H20.5a.5.5 0 01.5.5v9.5z"/>
          <path d="M3 8 C4.5 6 7 4.5 10 5 C13 5.5 15 7 17 8 C15 10 13 11.5 10 12 C7 12.5 4.5 11 3 8Z" stroke-dasharray="2 1.5"/>
          <circle cx="10" cy="8" r="2"/>
        </svg>
        <p>Position your fish in frame<br><span style="color:var(--teal);font-size:11px;">Camera access required for live scanning</span></p>
      </div>

      <div class="analyzing-overlay" id="analyzingOverlay">
        <div class="sonar">
          <div class="sonar-ring"></div>
          <div class="sonar-ring"></div>
          <div class="sonar-ring"></div>
          <div class="sonar-dot"></div>
        </div>
        <div class="analyzing-text">Identifying species…</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-primary" id="captureBtn" onclick="captureAndAnalyze()" disabled>
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M2 12 C4 8 7 4.5 12 4.5 C17 4.5 20 8 22 12 C20 16 17 19.5 12 19.5 C7 19.5 4 16 2 12Z"/>
        </svg>
        SCAN FISH
      </button>
      <button class="btn-secondary" id="uploadBtn" onclick="document.getElementById('file-input').click()" style="display:none;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Browse File
      </button>
      <button class="btn-secondary" onclick="resetAll()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
        </svg>
        Reset
      </button>
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="handleFileUpload(event)"/>

    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="section-label" style="margin-top:32px;">Identification Results</div>
    <div class="fish-card" id="fishCard">
      <!-- injected by JS -->
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast">Copied to clipboard!</div>

<script>
// — Background effects —
(function(){
  const bg = document.getElementById('oceanBg');
  for(let i=0;i<18;i++){
    const b = document.createElement('div');
    b.className = 'bubble';
    const s = 6+Math.random()*28;
    b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*10}s;`;
    bg.appendChild(b);
  }
  for(let i=0;i<8;i++){
    const r = document.createElement('div');
    r.className = 'ray';
    r.style.cssText = `left:${5+i*13}%;animation-duration:${7+Math.random()*5}s;animation-delay:${Math.random()*4}s;`;
    bg.appendChild(r);
  }
})();

// — State —
let currentMode = 'camera';
let stream = null;
let capturedImageBase64 = null;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const previewImg = document.getElementById('preview-img');
const captureBtn = document.getElementById('captureBtn');
const captureZone = document.getElementById('captureZone');
const idlePlaceholder = document.getElementById('idlePlaceholder');

async function setMode(mode) {
  currentMode = mode;
  document.getElementById('btnCamera').classList.toggle('active', mode==='camera');
  document.getElementById('btnUpload').classList.toggle('active', mode==='upload');
  document.getElementById('uploadBtn').style.display = mode==='upload' ? 'flex' : 'none';
  resetAll();
  if(mode==='camera') startCamera();
}

async function startCamera(){
  try {
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    video.srcObject = stream;
    video.style.display = 'block';
    idlePlaceholder.style.display = 'none';
    captureZone.classList.add('active');
    captureBtn.disabled = false;
  } catch(e) {
    showError('Camera access denied or unavailable. Please use the Upload mode to scan a stored image.');
  }
}

function stopCamera(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  video.style.display = 'none';
}

function handleFileUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    previewImg.src = ev.target.result;
    previewImg.style.display = 'block';
    idlePlaceholder.style.display = 'none';
    captureZone.classList.add('active');
    capturedImageBase64 = ev.target.result.split(',')[1];
    captureBtn.disabled = false;
    hideError();
  };
  reader.readAsDataURL(file);
}

async function captureAndAnalyze(){
  hideError();
  document.getElementById('results').style.display = 'none';

  let base64 = capturedImageBase64;

  if(currentMode === 'camera'){
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
    base64 = dataUrl.split(',')[1];
    previewImg.src = dataUrl;
    previewImg.style.display = 'block';
    capturedImageBase64 = base64;
  }

  if(!base64){ showError('No image captured. Please allow camera access or upload a fish image.'); return; }

  // Show scanning animation
  captureZone.classList.add('scanning');
  document.getElementById('analyzingOverlay').classList.add('show');
  captureBtn.disabled = true;

  try {
    const result = await identifyFish(base64);
    renderResult(result);
  } catch(err) {
    showError('Analysis failed: ' + err.message);
  } finally {
    captureZone.classList.remove('scanning');
    document.getElementById('analyzingOverlay').classList.remove('show');
    captureBtn.disabled = false;
  }
}

async function identifyFish(base64Image){
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'image',
            source: { type: 'base64', media_type: 'image/jpeg', data: base64Image }
          },
          {
            type: 'text',
            text: `You are AquaScan, an expert marine biologist and fish identification AI.

Analyze the image and identify any fish present. If a fish is found, respond ONLY with a valid JSON object (no markdown, no code fences). If no fish is detected, respond with {"error":"no_fish"}.

JSON schema:
{
  "commonName": "string",
  "scientificName": "string",
  "family": "string",
  "confidence": "High|Medium|Low",
  "habitat": "string (e.g. Freshwater, Marine, Brackish)",
  "distribution": "string",
  "averageLength": "string",
  "maxWeight": "string",
  "lifespan": "string",
  "diet": "string",
  "conservationStatus": "string",
  "isEdible": "Yes|No|Sometimes",
  "description": "string (2-3 sentences about the fish)",
  "funFact": "string (one surprising or delightful fact)"
}`
          }
        ]
      }]
    })
  });

  if(!response.ok){
    const e = await response.json().catch(()=>({}));
    throw new Error(e.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();
  const text = data.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();

  let parsed;
  try { parsed = JSON.parse(text); } catch(e) { throw new Error('Could not parse fish data.'); }

  if(parsed.error === 'no_fish') throw new Error('No fish detected in the image. Please point the camera at a fish or upload a fish photo.');
  return parsed;
}

function escapeForAttr(s){ return (s||'').replace(/'/g,"&#39;").replace(/"/g,'&quot;'); }

function shareOn(platform, name, sci){
  const text = `🐟 I just identified a ${name} (${sci}) using AquaScan! #AquaScan #FishID #MarineLife`;
  const url = encodeURIComponent(window.location.href);
  const t = encodeURIComponent(text);
  const urls = {
    twitter: `https://twitter.com/intent/tweet?text=${t}&url=${url}`,
    facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${t}`,
    whatsapp: `https://wa.me/?text=${t}%20${url}`
  };
  window.open(urls[platform], '_blank', 'width=600,height=500');
}

function copyInfo(name, sci, desc){
  const text = `🐟 AquaScan Fish ID\n\nSpecies: ${name} (${sci})\n\n${desc}\n\n#AquaScan #FishID`;
  navigator.clipboard.writeText(text).then(()=>showToast('Copied to clipboard!')).catch(()=>showToast('Copy failed.'));
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

function showError(msg){ const b=document.getElementById('errorBox'); b.textContent=msg; b.classList.add('show'); }
function hideError(){ document.getElementById('errorBox').classList.remove('show'); }

function resetAll(){
  stopCamera();
  previewImg.style.display = 'none';
  previewImg.src = '';
  capturedImageBase64 = null;
  idlePlaceholder.style.display = 'flex';
  captureZone.classList.remove('active','scanning');
  captureBtn.disabled = true;
  document.getElementById('results').style.display = 'none';
  document.getElementById('file-input').value = '';
  hideError();
}

// Auto-start camera on load
window.addEventListener('load', ()=>{ startCamera(); });
</script>
